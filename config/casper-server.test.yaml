listen:
  port: 3001
  cors_origins: ["http://localhost:5173"]

database:
  url: postgres://casper:casper@localhost:5432/casper_test
  owner_url: "postgres:///casper_test?host=/var/run/postgresql&user=sysadm"
  main_pool_size: 10
  analytics_pool_size: 5

auth:
  dev_auth: true
  admin_email: admin@ventoo.ch

web_search:
  base_url: http://localhost:8080
  format: json
  max_results: 10

web_fetch:
  timeout_secs: 30
  max_response_bytes: 1048576

knowledge:
  storage_path: ./data/knowledge-test
  embedding_deployment: embeddings-default

actors:
  idle_timeout_secs: 300
  max_concurrent_per_tenant: 50
