# Casper Platform — Local Development
#
# Usage:
#   docker compose up -d        # start all services
#   docker compose logs -f app  # follow server logs
#   docker compose down -v      # stop and remove volumes

services:
  # ── PostgreSQL 16 with pgvector ─────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: casper
      POSTGRES_PASSWORD: casper
      POSTGRES_DB: casper
    ports:
      - "5433:5432"  # 5433 to avoid conflict with host PostgreSQL
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casper"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Casper Server ───────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      CASPER_CONFIG: /etc/casper/casper-server.yaml
      RUST_LOG: info,sqlx=warn
    volumes:
      - ./config/casper-server.docker.yaml:/etc/casper/casper-server.yaml:ro
      - knowledge_data:/var/lib/casper/knowledge
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 5

  # ── SearXNG (web search) ───────────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    volumes:
      - searxng_data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

  # ── Agent Backend (local inference sidecar) ──────────────────────
  agent-backend:
    build:
      context: .
      dockerfile: Dockerfile.agent-backend
    environment:
      RUST_LOG: info
    volumes:
      - ./config/agent-backend.yaml:/etc/casper/config.yaml:ro
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - agent-backend

volumes:
  pgdata:
  knowledge_data:
  searxng_data:
