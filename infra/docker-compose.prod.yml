# Casper Platform — Production (single VM)
#
# Requires .env file with: POSTGRES_PASSWORD, ACR_IMAGE, DOMAIN,
#   CASPER_DEV_AUTH, CASPER_ADMIN_EMAIL, and optionally CASPER_MASTER_KEY.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d

services:
  # ── Caddy (reverse proxy + auto-HTTPS) ──────────────────────────
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN}

  # ── Casper Server ───────────────────────────────────────────────
  app:
    image: ${ACR_IMAGE:-casper-server:latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://casper:${POSTGRES_PASSWORD}@db:5432/casper
      DATABASE_OWNER_URL: postgres://casper:${POSTGRES_PASSWORD}@db:5432/casper
      CASPER_PUBLIC_URL: https://${DOMAIN}
      CASPER_DEV_AUTH: ${CASPER_DEV_AUTH:-true}
      CASPER_MASTER_KEY: ${CASPER_MASTER_KEY:-}
      CASPER_ADMIN_EMAIL: ${CASPER_ADMIN_EMAIL:-admin@ventoo.ch}
      RUST_LOG: info,sqlx=warn
    volumes:
      - knowledge_data:/var/lib/casper/knowledge
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      start_period: 30s
      retries: 5

  # ── PostgreSQL 16 + pgvector ────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: casper
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: casper
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casper"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── SearXNG (web search) ────────────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    volumes:
      - searxng_data:/etc/searxng
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID]

volumes:
  pgdata:
  knowledge_data:
  caddy_data:
  caddy_config:
  searxng_data:
