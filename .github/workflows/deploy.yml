# ═══════════════════════════════════════════════════════════════════
# Casper Platform — Build & Deploy to Azure
# ═══════════════════════════════════════════════════════════════════
#
# Prerequisites (one-time setup):
#   1. Create an Azure AD app registration for GitHub OIDC:
#        az ad app create --display-name "github-casper-deploy"
#        az ad sp create --id <appId>
#        # Add federated credential for this repo's main branch
#
#   2. Set these GitHub repository secrets:
#        AZURE_CLIENT_ID       — App registration client ID
#        AZURE_TENANT_ID       — Azure AD tenant ID
#        AZURE_SUBSCRIPTION_ID — Target subscription
#        POSTGRES_PASSWORD     — PostgreSQL admin password
#
#   3. (Optional) Set these GitHub repository variables:
#        RESOURCE_GROUP — Resource group name   (default: rg-casper-dev)
#        LOCATION       — Azure region          (default: switzerlandnorth)
#        ENVIRONMENT    — dev | staging | prod  (default: dev)

name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [dev, staging, prod]
        default: dev

permissions:
  id-token: write
  contents: read

env:
  ENVIRONMENT: ${{ inputs.environment || vars.ENVIRONMENT || 'dev' }}
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP || 'rg-casper-dev' }}
  LOCATION: ${{ vars.LOCATION || 'switzerlandnorth' }}

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Azure Login (OIDC) ──────────────────────────────────────

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Ensure resource group exists ────────────────────────────

      - name: Create resource group
        run: |
          az group create \
            --name "$RESOURCE_GROUP" \
            --location "$LOCATION" \
            --output none

      # ── Deploy infrastructure (Bicep) ───────────────────────────
      # On first run the Container App uses a quickstart placeholder image.
      # After the real image is pushed, we update the Container App below.

      - name: Deploy infrastructure
        id: infra
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: >-
            env=${{ env.ENVIRONMENT }}
            postgresPassword=${{ secrets.POSTGRES_PASSWORD }}
          failOnStdErr: false

      # ── Build & push Docker image ───────────────────────────────

      - name: Login to ACR
        run: az acr login --name ${{ steps.infra.outputs.acrName }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.infra.outputs.acrLoginServer }}/casper-server:${{ github.sha }}
            ${{ steps.infra.outputs.acrLoginServer }}/casper-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Update Container App with real image ────────────────────

      - name: Deploy container revision
        run: |
          az containerapp update \
            --name "ca-casper-$ENVIRONMENT" \
            --resource-group "$RESOURCE_GROUP" \
            --image "${{ steps.infra.outputs.acrLoginServer }}/casper-server:${{ github.sha }}"

      # ── Summary ─────────────────────────────────────────────────

      - name: Deployment summary
        run: |
          echo "### Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** ${{ steps.infra.outputs.appUrl }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`casper-server:${GITHUB_SHA::8}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** $ENVIRONMENT" >> $GITHUB_STEP_SUMMARY
          echo "- **PostgreSQL:** ${{ steps.infra.outputs.postgresHost }}" >> $GITHUB_STEP_SUMMARY
