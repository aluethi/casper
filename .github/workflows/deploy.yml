# ═══════════════════════════════════════════════════════════════════
# Casper Platform — Build & Deploy to Azure VM
# ═══════════════════════════════════════════════════════════════════
#
# One-time setup:
#
#   1. Generate an SSH key pair:
#        ssh-keygen -t ed25519 -f ~/.ssh/casper-deploy -N ""
#
#   2. Create an Azure AD app for GitHub OIDC:
#        APP_ID=$(az ad app create --display-name github-casper-deploy --query appId -o tsv)
#        az ad sp create --id $APP_ID
#        SUB_ID=$(az account show --query id -o tsv)
#        az role assignment create --assignee $APP_ID --role Contributor --scope /subscriptions/$SUB_ID
#        az ad app federated-credential create --id $APP_ID --parameters '{
#          "name": "github-main",
#          "issuer": "https://token.actions.githubusercontent.com",
#          "subject": "repo:aluethi/casper:ref:refs/heads/main",
#          "audiences": ["api://AzureADTokenExchange"]
#        }'
#
#   3. Set GitHub repository secrets:
#        gh secret set AZURE_CLIENT_ID       --body "$APP_ID"
#        gh secret set AZURE_TENANT_ID       --body "$(az account show --query tenantId -o tsv)"
#        gh secret set AZURE_SUBSCRIPTION_ID --body "$SUB_ID"
#        gh secret set VM_SSH_KEY            < ~/.ssh/casper-deploy
#        gh secret set VM_SSH_PUBLIC_KEY     < ~/.ssh/casper-deploy.pub
#        gh secret set POSTGRES_PASSWORD       # will prompt
#
#   4. Push to main (or run manually).

name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP || 'rg-casper' }}
  LOCATION: ${{ vars.LOCATION || 'switzerlandnorth' }}
  VM_USER: casperadmin
  FRONT_DOOR_ID: ${{ vars.FRONT_DOOR_ID }}
  FRONT_DOOR_HOSTNAME: ${{ vars.FRONT_DOOR_HOSTNAME }}

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Azure Login ─────────────────────────────────────────────

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Deploy Infrastructure ───────────────────────────────────

      - name: Create resource group
        run: az group create --name "$RESOURCE_GROUP" --location "$LOCATION" --output none

      - name: Deploy Bicep
        id: infra
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: >-
            sshPublicKey=${{ secrets.VM_SSH_PUBLIC_KEY }}
            frontDoorId=${{ env.FRONT_DOOR_ID }}
          failOnStdErr: false

      # ── Build & Push Docker Image ───────────────────────────────

      - name: Login to ACR
        run: az acr login --name ${{ steps.infra.outputs.acrName }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.infra.outputs.acrLoginServer }}/casper-server:${{ github.sha }}
            ${{ steps.infra.outputs.acrLoginServer }}/casper-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy to VM ────────────────────────────────────────────

      - name: Get ACR credentials
        id: acr
        run: |
          echo "password=$(az acr credential show --name ${{ steps.infra.outputs.acrName }} --query 'passwords[0].value' -o tsv)" >> $GITHUB_OUTPUT

      - name: Copy compose files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ steps.infra.outputs.vmPublicIp }}
          username: ${{ env.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "infra/docker-compose.prod.yml,infra/Caddyfile"
          target: /opt/casper
          strip_components: 1

      - name: Deploy containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.infra.outputs.vmPublicIp }}
          username: ${{ env.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /opt/casper

            # Login to ACR
            echo "${{ steps.acr.outputs.password }}" | \
              docker login ${{ steps.infra.outputs.acrLoginServer }} \
                -u ${{ steps.infra.outputs.acrName }} --password-stdin

            # Write .env
            cat > .env << 'ENVEOF'
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            ACR_IMAGE=${{ steps.infra.outputs.acrLoginServer }}/casper-server:${{ github.sha }}
            FRONT_DOOR_ID=${{ env.FRONT_DOOR_ID }}
            CASPER_PUBLIC_URL=https://${{ env.FRONT_DOOR_HOSTNAME }}
            CASPER_DEV_AUTH=true
            CASPER_ADMIN_EMAIL=admin@ventoo.ch
            ENVEOF

            # Pull and (re)start
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

      # ── Summary ─────────────────────────────────────────────────

      - name: Deployment summary
        run: |
          echo "### Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Front Door:** https://${{ env.FRONT_DOOR_HOSTNAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Origin (VM):** ${{ steps.infra.outputs.vmPublicIp }}" >> $GITHUB_STEP_SUMMARY
          echo "- **SSH:** ${{ steps.infra.outputs.sshCommand }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`casper-server:${GITHUB_SHA::8}\`" >> $GITHUB_STEP_SUMMARY
